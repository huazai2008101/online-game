version: '3.8'

services:
  # PostgreSQL Databases
  postgres-platform:
    image: postgres:15-alpine
    container_name: game-platform-db
    environment:
      POSTGRES_USER: gameuser
      POSTGRES_PASSWORD: gamepass
      POSTGRES_DB: game_platform_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-platform-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-core:
    image: postgres:15-alpine
    container_name: game-core-db
    environment:
      POSTGRES_USER: gameuser
      POSTGRES_PASSWORD: gamepass
      POSTGRES_DB: game_core_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-core-data:/var/lib/postgresql/data

  postgres-payment:
    image: postgres:15-alpine
    container_name: game-payment-db
    environment:
      POSTGRES_USER: gameuser
      POSTGRES_PASSWORD: gamepass
      POSTGRES_DB: game_payment_db
    ports:
      - "5434:5432"
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data

  postgres-notification:
    image: postgres:15-alpine
    container_name: game-notification-db
    environment:
      POSTGRES_USER: gameuser
      POSTGRES_PASSWORD: gamepass
      POSTGRES_DB: game_notification_db
    ports:
      - "5435:5432"
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data

  postgres-file:
    image: postgres:15-alpine
    container_name: game-file-db
    environment:
      POSTGRES_USER: gameuser
      POSTGRES_PASSWORD: gamepass
      POSTGRES_DB: game_file_db
    ports:
      - "5436:5432"
    volumes:
      - postgres-file-data:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:7-alpine
    container_name: game-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: game-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: game-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # NATS for lightweight messaging
  nats:
    image: nats:2.10-alpine
    container_name: game-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-js"
    volumes:
      - nats-data:/data

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: game-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: game-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana-dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

  # Jaeger for tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: game-jaeger
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"

  # Game Services
  user-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.user
    container_name: user-service
    ports:
      - "8001:8001"
    environment:
      DB_HOST: postgres-platform
      DB_PORT: 5432
      DB_USER: gameuser
      DB_PASS: gamepass
      DB_NAME: game_platform_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      postgres-platform:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  game-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.game
    container_name: game-service
    ports:
      - "8002:8002"
    environment:
      DB_HOST: postgres-core
      DB_PORT: 5432
      DB_USER: gameuser
      DB_PASS: gamepass
      DB_NAME: game_core_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      - postgres-core
      - redis
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.payment
    container_name: payment-service
    ports:
      - "8003:8003"
    environment:
      DB_HOST: postgres-payment
      DB_PORT: 5432
      DB_USER: gameuser
      DB_PASS: gamepass
      DB_NAME: game_payment_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      - postgres-payment
      - redis
    restart: unless-stopped

  player-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.player
    container_name: player-service
    ports:
      - "8004:8004"
    environment:
      DB_HOST: postgres-core
      DB_PORT: 5432
      DB_USER: gameuser
      DB_PASS: gamepass
      DB_NAME: game_core_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres-core
      - redis
    restart: unless-stopped

  activity-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.activity
    container_name: activity-service
    ports:
      - "8005:8005"
    environment:
      DB_HOST: postgres-core
      DB_PORT: 5432
      DB_USER: gameuser
      DB_PASS: gamepass
      DB_NAME: game_core_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres-core
      - redis
    restart: unless-stopped

  guild-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.guild
    container_name: guild-service
    ports:
      - "8006:8006"
    environment:
      DB_HOST: postgres-core
      DB_PORT: 5432
      DB_USER: gameuser
      DB_PASS: gamepass
      DB_NAME: game_core_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres-core
      - redis
    restart: unless-stopped

  item-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.item
    container_name: item-service
    ports:
      - "8007:8007"
    environment:
      DB_HOST: postgres-core
      DB_PORT: 5432
      DB_USER: gameuser
      DB_PASS: gamepass
      DB_NAME: game_core_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres-core
      - redis
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.notification
    container_name: notification-service
    ports:
      - "8008:8008"
    environment:
      DB_HOST: postgres-notification
      DB_PORT: 5432
      DB_USER: gameuser
      DB_PASS: gamepass
      DB_NAME: game_notification_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres-notification
      - redis
    restart: unless-stopped

  organization-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.organization
    container_name: organization-service
    ports:
      - "8009:8009"
    environment:
      DB_HOST: postgres-platform
      DB_PORT: 5432
      DB_USER: gameuser
      DB_PASS: gamepass
      DB_NAME: game_platform_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres-platform
      - redis
    restart: unless-stopped

  permission-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.permission
    container_name: permission-service
    ports:
      - "8010:8010"
    environment:
      DB_HOST: postgres-platform
      DB_PORT: 5432
      DB_USER: gameuser
      DB_PASS: gamepass
      DB_NAME: game_platform_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres-platform
      - redis
    restart: unless-stopped

  id-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.id
    container_name: id-service
    ports:
      - "8011:8011"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    restart: unless-stopped

  file-service:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.file
    container_name: file-service
    ports:
      - "8012:8012"
    environment:
      DB_HOST: postgres-file
      DB_PORT: 5432
      DB_USER: gameuser
      DB_PASS: gamepass
      DB_NAME: game_file_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STORAGE_PATH: /data/uploads
    volumes:
      - uploads-data:/data/uploads
    depends_on:
      - postgres-file
      - redis
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8001
      GAME_SERVICE_URL: http://game-service:8002
      PAYMENT_SERVICE_URL: http://payment-service:8003
      PLAYER_SERVICE_URL: http://player-service:8004
      ACTIVITY_SERVICE_URL: http://activity-service:8005
      GUILD_SERVICE_URL: http://guild-service:8006
      ITEM_SERVICE_URL: http://item-service:8007
      NOTIFICATION_SERVICE_URL: http://notification-service:8008
      ORGANIZATION_SERVICE_URL: http://organization-service:8009
      PERMISSION_SERVICE_URL: http://permission-service:8010
      ID_SERVICE_URL: http://id-service:8011
      FILE_SERVICE_URL: http://file-service:8012
    depends_on:
      - user-service
      - game-service
      - payment-service
      - player-service
      - activity-service
      - guild-service
      - item-service
      - notification-service
      - organization-service
      - permission-service
      - id-service
      - file-service
    restart: unless-stopped

volumes:
  postgres-platform-data:
  postgres-core-data:
  postgres-payment-data:
  postgres-notification-data:
  postgres-file-data:
  redis-data:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  nats-data:
  prometheus-data:
  grafana-data:
  uploads-data:

networks:
  default:
    name: game-network
