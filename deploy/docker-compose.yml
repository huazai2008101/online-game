version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gameplatform
      POSTGRES_USER: gameplatform
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gameplatform123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  user-service:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: user-service
    ports:
      - "8001:8001"
      - "9001:9001"
    env_file:
      - ../deploy/config/user-service.env
    depends_on:
      postgres:
        condition: service_healthy

  game-service:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: game-service
    ports:
      - "8002:8002"
      - "9002:9002"
    env_file:
      - ../deploy/config/game-service.env
    volumes:
      - game-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  admin-service:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: admin-service
    ports:
      - "8003:8003"
    env_file:
      - ../deploy/config/admin-service.env
    volumes:
      - game-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started

  api-gateway:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: api-gateway
    ports:
      - "8080:8080"
    env_file:
      - ../deploy/config/gateway.env
    depends_on:
      - user-service
      - game-service
      - admin-service

volumes:
  pgdata:
  game-data:
