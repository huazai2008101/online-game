# Prometheus Configuration
# Author: online-game team
# Description: Monitoring configuration for the game platform

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

  # External labels
  external_labels:
    cluster: 'online-game'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Rule files
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Service discovery configurations
scrape_configs:

  # ========================================
  # Prometheus self-monitoring
  # ========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ========================================
  # API Gateway
  # ========================================
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']
        labels:
          service: 'gateway'
          tier: 'frontend'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ========================================
  # WebSocket Gateway
  # ========================================
  - job_name: 'ws-gateway'
    static_configs:
      - targets: ['ws-gateway:8081']
        labels:
          service: 'ws-gateway'
          tier: 'frontend'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ========================================
  # Game Service
  # ========================================
  - job_name: 'game-service'
    static_configs:
      - targets: ['game-service:8001']
        labels:
          service: 'game-service'
          tier: 'backend'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ========================================
  # User Service
  # ========================================
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:8002']
        labels:
          service: 'user-service'
          tier: 'backend'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ========================================
  # Payment Service
  # ========================================
  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:8003']
        labels:
          service: 'payment-service'
          tier: 'backend'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ========================================
  # Match Service
  # ========================================
  - job_name: 'match-service'
    static_configs:
      - targets: ['match-service:8004']
        labels:
          service: 'match-service'
          tier: 'backend'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ========================================
  # Node Exporter (host metrics)
  # ========================================
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
    scrape_interval: 30s

  # ========================================
  # cAdvisor (container metrics)
  # ========================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
    scrape_interval: 30s

  # ========================================
  # PostgreSQL Exporter
  # ========================================
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
          tier: 'database'
    scrape_interval: 30s

  # ========================================
  # Redis Exporter
  # ========================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          tier: 'cache'
    scrape_interval: 30s

  # ========================================
  # NATS Exporter
  # ========================================
  - job_name: 'nats'
    static_configs:
      - targets: ['nats-exporter:7777']
        labels:
          service: 'nats'
          tier: 'messaging'
    scrape_interval: 30s

  # ========================================
  # Kubernetes API Server
  # ========================================
  - job_name: 'kubernetes-apiservers'
    kubernetes_sd_configs:
      - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

  # ========================================
  # Kubernetes Nodes
  # ========================================
  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  # ========================================
  # Kubernetes Pods
  # ========================================
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
