global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'game-platform'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files:
  # - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Game Services
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:8001']
    metrics_path: '/metrics'

  - job_name: 'game-service'
    static_configs:
      - targets: ['game-service:8002']
    metrics_path: '/metrics'

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:8003']
    metrics_path: '/metrics'

  - job_name: 'player-service'
    static_configs:
      - targets: ['player-service:8004']
    metrics_path: '/metrics'

  - job_name: 'activity-service'
    static_configs:
      - targets: ['activity-service:8005']
    metrics_path: '/metrics'

  - job_name: 'guild-service'
    static_configs:
      - targets: ['guild-service:8006']
    metrics_path: '/metrics'

  - job_name: 'item-service'
    static_configs:
      - targets: ['item-service:8007']
    metrics_path: '/metrics'

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8008']
    metrics_path: '/metrics'

  - job_name: 'organization-service'
    static_configs:
      - targets: ['organization-service:8009']
    metrics_path: '/metrics'

  - job_name: 'permission-service'
    static_configs:
      - targets: ['permission-service:8010']
    metrics_path: '/metrics'

  - job_name: 'id-service'
    static_configs:
      - targets: ['id-service:8011']
    metrics_path: '/metrics'

  - job_name: 'file-service'
    static_configs:
      - targets: ['file-service:8012']
    metrics_path: '/metrics'

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
    metrics_path: '/metrics'

  # PostgreSQL Exporter
  - job_name: 'postgres-platform'
    static_configs:
      - targets: ['postgres-platform:5432']

  - job_name: 'postgres-core'
    static_configs:
      - targets: ['postgres-core:5432']

  - job_name: 'postgres-payment'
    static_configs:
      - targets: ['postgres-payment:5432']

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # Kafka JMX Exporter
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
