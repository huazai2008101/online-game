# buf.gen.yaml - Buf 生成配置
# Author: online-game team
# Description: Protobuf 代码生成配置

version: v1

# 插件配置
plugins:
  # Go 代码生成
  - plugin: buf.build/protocolbuffers/go
    out: pkg
    opt:
      - paths=source_relative

  # gRPC Go 代码生成
  - plugin: buf.build/grpc/go
    out: pkg
    opt:
      - paths=source_relative

  # gRPC Gateway 代码生成
  - plugin: buf.build/grpc-ecosystem/gateway
    out: pkg
    opt:
      - paths=source_relative
      - generate_unbound_methods=true

  # OpenAPI v2 生成
  - plugin: buf.build/grpc-ecosystem/openapiv2
    out: api/openapi
    opt:
      - merge_file_name=api
      - allow_merge=true
      - json_names_for_fields=false

  # 验证代码生成
  - plugin: buf.build/envoyproxy/protoc-gen-validate
    out: pkg
    opt:
      - paths=source_relative
      - lang=go

# 插入点配置
insertion_points:
  # Go 插入点
  - type: insert
    path: pkg
    insert: |
      // Code generated by buf. DO NOT EDIT.
