# buf.yaml - Buf 配置文件
# Author: online-game team
# Description: Protobuf 工具链配置

version: v1

# 构建配置
build:
  # 除外目录
  excludes:
    - third_party

# 依赖管理
deps:
  # 通用 API 定义
  - buf.build/googleapis/googleapis
  # gRPC 监控
  - buf.build/grpc-ecosystem/grpc-gateway
  # Protobuf 验证
  - buf.build/envoyproxy/protoc-gen-validate

# Lint 配置
lint:
  # 使用的规则
  use:
    - DEFAULT
    - COMMENTS
    - PACKAGE_SAME_DIRECTORY
    - ENUM_ZERO_VALUE_SUFFIX

  # 排除规则
  ignore:
    - third_party

  # 允许的注释风格
  allow_comment_ignores: true

# Breaking change 检查
breaking:
  # 使用的规则
  use:
    - FILE
    - PACKAGE
    - WIRE_JSON

  # 排除
  ignore:
    - third_party
    - buf/googleapis

# 格式化配置
format:
  # 格式化所有文件
  - paths:
      - proto
      - third_party
